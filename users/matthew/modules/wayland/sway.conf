# set modifier
set $mod Mod4
set $alt Mod1

xwayland disable
default_border none

input type:keyboard {
    xkb_layout us
    xkb_variant ,nodeadkeys
    xkb_options grp:alt_shift_toggle
}

input type:touchpad {
    tap enabled
    natural_scroll enabled
}

## Used to identify active windows instead of pixel border https://github.com/fennerm/flashfocus
#exec --no-startup-id flashfocus
#
## Autotiling script https://github.com/nwg-piotr/autotiling
#exec --no-startup-id autotiling

# Home row direction keys, like vim
set $left h
set $down j
set $up k
set $right l

# Terminal Emulator
set $term kitty
# Application Launcher
set $menu bemenu
bindsym $mod+d exec $menu --show drun
# Notification Daemon
set $notif mako

# Shows history after notifs disappear
bindsym ctrl+grave exec --no-startup-id makoctl restore

# exit sway (logs you out of your Wayland session)
bindsym $mod+Shift+e exec swaynag -t warning -m 'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' -b 'Yes, exit sway' 'swaymsg exit'

# restart sway inplace (preserves your layout/session, can be used to upgrade sway)
bindsym $mod+shift+r reload

# set font
#font pango: Noto Sans 8
font pango: Terminus Medium 9

# Use Mouse+$mod to drag floating windows to their wanted position
floating_modifier $mod


# start a terminal
bindsym $mod+Return exec kitty

# start dmenu (a program launcher)
bindsym $mod+Shift+d exec i3-dmenu-desktop --dmenu="dmenu -i -fn 'Noto Sans:size=8'"
#bindsym $mod+d exec rofi -lines 12 -padding 18 -width 60 -location 0 -show drun -sidebar-mode -columns 3 -font 'Noto Sans 8'
#bindsym $mod+d exec termite --name=launcher -e "bash -c 'compgen -c | grep -v fzf | sort -u | fzf --layout=reverse | xargs -r swaymsg -t command exec'"
#for_window [app_id="^launcher$"] floating enable, border none, opacity 0.8

#change volume
bindsym XF86AudioRaiseVolume exec amixer -q set Master 5%+
bindsym XF86AudioLowerVolume exec amixer -q set Master 5%-
bindsym XF86AudioMute exec amixer set Master toggle

# Media player controls
bindsym XF86AudioPlay exec playerctl play
bindsym XF86AudioPause exec playerctl pause
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPrev exec playerctl previous

# kill focused window
bindsym $mod+c kill
bindsym $alt+F4 kill

# change focus
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# move focused window
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# split in horizontal orientation
bindsym $mod+h split h

# split in vertical orientation
bindsym $mod+v split v

# enter fullscreen mode for the focused container
bindsym $mod+f fullscreen toggle

# change container layout split
bindsym $mod+s layout toggle split

# toggle tiling / floating
bindsym $mod+space floating toggle

# change focus between tiling / floating windows
bindsym $mod+Shift+space focus mode_toggle

# switch to workspace
bindsym $alt+Control+Right workspace next
bindsym $alt+Control+Left workspace prev

set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws10 "10"

# switch to workspace
bindsym Mod4+1		workspace $ws1
bindsym Mod4+2		workspace $ws2
bindsym Mod4+3		workspace $ws3
bindsym Mod4+4		workspace $ws4
bindsym Mod4+5		workspace $ws5
bindsym Mod4+6		workspace $ws6
bindsym Mod4+7		workspace $ws7
bindsym Mod4+8		workspace $ws8
bindsym Mod4+9		workspace $ws9
bindsym Mod4+0		workspace $ws10

# move focused container to workspace
bindsym Mod4+Shift+1	move container to workspace $ws1
bindsym Mod4+Shift+2	move container to workspace $ws2
bindsym Mod4+Shift+3	move container to workspace $ws3
bindsym Mod4+Shift+4	move container to workspace $ws4
bindsym Mod4+Shift+5	move container to workspace $ws5
bindsym Mod4+Shift+6	move container to workspace $ws6
bindsym Mod4+Shift+7	move container to workspace $ws7
bindsym Mod4+Shift+8	move container to workspace $ws8
bindsym Mod4+Shift+9	move container to workspace $ws9
bindsym Mod4+Shift+0    move container to workspace $ws10

# colour of border, background, text, indicator, and child_border
client.focused			#bf616a #2f343f #d8dee8 #bf616a #d8dee8
client.focused_inactive	#2f343f #2f343f #d8dee8 #2f343f #2f343f
client.unfocused		#2f343f #2f343f #d8dee8 #2f343f #2f343f
client.urgent			#2f343f #2f343f #d8dee8 #2f343f #2f343f
client.placeholder		#2f343f #2f343f #d8dee8 #2f343f #2f343f
client.background		#2f343f

# Needed for i3-gaps
#for_window [class="^.*"] border none 
gaps inner 5
gaps outer 5
set $term --no-startup-id $TERMINAL
set $Mod4 Mod4
set $stoprec --no-startup-id dmenurecord kill
set $shutdown sudo -A shutdown -h now
set $reboot sudo -A reboot
set $netrefresh --no-startup-id sudo -A systemctl restart NetworkManager
set $hibernate sudo -A systemctl suspend


# My additions

bindsym ctrl+shift+c exec grim -g "$(slurp -d)" - | wl-copy
for_window [class="Plexamp" instance="plexamp"] floating enable
bindsym Mod4+w sticky toggle
bindsym Mod4+x exec --no-startup-id swaylock
bindsym Mod4+s+alt exec --no-startup-id betterlockscreen -s

bindsym Mod4+n exec /home/matthew/git/rofi-wifi-menu/rofi-wifi-menu.sh

bindsym XF86MonBrightnessUp exec xbacklight -inc 20; # increase screen brightness
bindsym XF86MonBrightnessDown exec xbacklight -dec 20; # decrease screen brightness
bindsym Mod4+b exec /home/matthew/scripts/connect-bluetooth-headset.sh

#output "*" bg /home/matthew/.wallpaper.jpg fill


# Status Bar:
#
# Read `man 5 sway-bar` for more information about this section.

bar {
    position bottom

    # When the status_command prints a new line to stdout, swaybar updates.
    # The default just shows the current date and time.
    status_command while date +'%Y-%m-%d %l:%M:%S %p'; do sleep 1; done
    #status_command exec sample-bar
    font pango:DejaVu Sans Mono 10

    colors {
        statusline #ffffff
        background #323232
        inactive_workspace #32323200 #32323200 #5c5c5c
    }
}
